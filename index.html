<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Chi Tiêu - Đăng Ký</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #d1e7dd; /* Màu nền xanh nhạt giống ảnh */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        h2 {
            color: #444;
            margin-bottom: 5px;
        }
        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Giúp padding không làm tràn khung */
            outline: none;
        }
        input:focus {
            border-color: #5c8d89;
        }
        .btn-register {
            background-color: #5c8d89; /* Màu xanh đậm của nút Đăng nhập */
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-register:hover {
            background-color: #4a716e;
        }
        .footer-link {
            margin-top: 20px;
            font-size: 14px;
        }
        .footer-link a {
            color: #5c8d89;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">💵</div> <h2>Đăng Ký</h2>
    <p>Tạo tài khoản để quản lý tài chính tốt hơn</p>

    <form>
        <input type="text" placeholder="Họ và tên" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Mật khẩu" required>
        <input type="password" placeholder="Xác nhận mật khẩu" required>
        
        <button type="submit" class="btn-register">ĐĂNG KÝ</button>
    </form>

    <div class="footer-link">
        Đã có tài khoản? <a href="index.html">Đăng nhập ngay</a>
    </div>
</div>

</body>
</html>
